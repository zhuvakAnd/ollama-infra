version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== Login to ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - export IMAGE_TAG="$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)-${CODEBUILD_BUILD_NUMBER}"
      - echo "Image tag $IMAGE_TAG"
      - echo "=== Pull most recent image for layer cache ==="
      - |
        CACHE_TAG=$(aws ecr describe-images \
          --repository-name ollama-app \
          --region "$AWS_DEFAULT_REGION" \
          --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags | [0]' \
          --output text 2>/dev/null || true)
        if [ -n "$CACHE_TAG" ] && [ "$CACHE_TAG" != "None" ]; then
          echo "Using cache tag $CACHE_TAG"
          docker pull "$ECR_REPO_URI:$CACHE_TAG" || true
          export CACHE_FROM="--cache-from $ECR_REPO_URI:$CACHE_TAG"
        else
          echo "No existing image found for cache"
          export CACHE_FROM=""
        fi

  build:
    commands:
      - echo "=== Building Docker image ==="
      - |
        docker build \
          $CACHE_FROM \
          -t $ECR_REPO_URI:$IMAGE_TAG \
          -f docker/Tinyllama.Dockerfile .

  post_build:
    commands:
      - echo "=== Pushing image to ECR ==="
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - echo "=== Generating imageDetail.json ==="
      - printf '{"ImageURI":"%s:%s"}' "$ECR_REPO_URI" "$IMAGE_TAG" > imageDetail.json
      - echo "=== Fetching current task definition ARN ==="
      - |
        TASK_DEF_ARN=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --region $AWS_DEFAULT_REGION \
          --query 'services[0].taskDefinition' \
          --output text)
      - echo "Task definition $TASK_DEF_ARN"
      - echo "=== Generating taskdef.json ==="
      - |
        aws ecs describe-task-definition \
          --task-definition "$TASK_DEF_ARN" \
          --region "$AWS_DEFAULT_REGION" \
          --query 'taskDefinition' \
        | jq --arg name "$CONTAINER_NAME" \
             --arg img "<IMAGE1_NAME>" \
             'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
              | .containerDefinitions |=
                  map(if .name == $name then .image = $img else . end)' \
        > taskdef.json
      - echo "=== Artifacts ==="
      - cat imageDetail.json
      - echo "taskdef.json generated successfully"

artifacts:
  files:
    - imageDetail.json
    - taskdef.json
  discard-paths: yes
