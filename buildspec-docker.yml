version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== Login to ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)
      - echo "Image tag: $IMAGE_TAG"
      - echo "=== Pull latest image for layer cache ==="
      - docker pull $ECR_REPO_URI:latest || true

  build:
    commands:
      - echo "=== Building Docker image ==="
      - |
        docker build \
          --cache-from $ECR_REPO_URI:latest \
          -t $ECR_REPO_URI:$IMAGE_TAG \
          -t $ECR_REPO_URI:latest \
          -f docker/Tinyllama.Dockerfile .

  post_build:
    commands:
      - echo "=== Pushing images to ECR ==="
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      - echo "=== Generating imageDetail.json ==="
      - printf '{"ImageURI":"%s:%s"}' "$ECR_REPO_URI" "$IMAGE_TAG" > imageDetail.json
      - echo "=== Generating taskdef.json from current task definition ==="
      - |
        TASK_DEF_ARN=$(aws ecs describe-services \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --region $AWS_DEFAULT_REGION \
          --query 'services[0].taskDefinition' \
          --output text)
      - echo "Current task definition: $TASK_DEF_ARN"
      - |
        aws ecs describe-task-definition \
          --task-definition "$TASK_DEF_ARN" \
          --region "$AWS_DEFAULT_REGION" \
          --query 'taskDefinition' \
        | python3 -c "
import json, sys, os
td = json.load(sys.stdin)
# Strip read-only fields that cannot be in a RegisterTaskDefinition request
for field in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes',
              'compatibilities', 'registeredAt', 'registeredBy']:
    td.pop(field, None)
# Replace the target container image with the CodePipeline placeholder
container_name = os.environ['CONTAINER_NAME']
for c in td.get('containerDefinitions', []):
    if c['name'] == container_name:
        c['image'] = '<IMAGE1_NAME>'
print(json.dumps(td, indent=2))
" > taskdef.json
      - echo "=== Build artifacts ==="
      - cat imageDetail.json
      - echo "taskdef.json generated successfully"

artifacts:
  # Both files are consumed by the CodeDeployToECS pipeline action:
  #   imageDetail.json  -> Image1ArtifactName  (image URI substitution)
  #   taskdef.json      -> TaskDefinitionTemplateArtifact  (<IMAGE1_NAME> placeholder)
  files:
    - imageDetail.json
    - taskdef.json
  discard-paths: yes
